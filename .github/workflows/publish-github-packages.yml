name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://npm.pkg.github.com'
          
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-wasip1
          
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Install Rust wasm32-wasip1 target
        run: rustup target add wasm32-wasip1
        
      - name: Build the plugin
        run: |
          cargo build --release --target wasm32-wasip1
          
      - name: Copy built plugin
        run: |
          cp target/wasm32-wasip1/release/swc_plugin_react_intl_auto.wasm swc-plugin-react-intl-auto.wasm
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm test
        
      - name: Extract version from tag
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          
      - name: Update package.json version
        run: |
          npm version ${{ steps.get_version.outputs.version }} --no-git-tag-version
          
      - name: Update Cargo.toml version
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.get_version.outputs.version }}\"/" Cargo.toml
          
      - name: Configure package for GitHub Packages
        run: |
          # Update package.json to use GitHub Packages
          npm pkg set publishConfig.registry=https://npm.pkg.github.com
          npm pkg set publishConfig.@${{ github.repository_owner }}:registry=https://npm.pkg.github.com
          
      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ steps.get_version.outputs.version }}" \
            --notes "Automated release of version ${{ steps.get_version.outputs.version }}" \
            --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
