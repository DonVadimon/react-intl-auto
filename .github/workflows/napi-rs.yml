name: CI

env:
    DEBUG: napi:*
    APP_NAME: react-intl-auto
    MACOSX_DEPLOYMENT_TARGET: '10.13'
    CARGO_INCREMENTAL: '1'

on:
    push:
        branches:
            - master
        tags-ignore:
            - '**'
        paths-ignore:
            - '**/*.md'
            - LICENSE
            - '**/*.gitignore'
            - .editorconfig
            - docs/**
    pull_request:
        branches:
            - master
    workflow_dispatch:
        inputs:
            version_type:
                description: 'Version type to publish'
                required: true
                default: 'patch'
                type: choice
                options:
                    - release
                    - prerelease

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy, rustfmt

            - name: Cache npm dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: npm-deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      npm-deps-${{ runner.os }}-

            - name: Install dependencies
              run: npm ci --cache=.npm --prefer-offline

            - name: Run lint
              run: npm run lint

    build-wasm:
        name: Build WASM Plugin
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  targets: wasm32-wasip1

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      target/
                  key: wasm-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Cache npm dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: npm-deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      npm-deps-${{ runner.os }}-

            - name: Install dependencies
              run: npm ci --cache=.npm --prefer-offline

            - name: Build WASM plugin
              run: npm run build:plugin

            - name: Upload WASM artifact
              uses: actions/upload-artifact@v4
              with:
                  name: wasm-plugin
                  path: |
                      swc-plugin.wasm
                  if-no-files-found: error

    build-napi:
        name: Build napi-rs ${{ matrix.settings.target }}
        strategy:
            fail-fast: false
            matrix:
                settings:
                    - host: macos-latest
                      target: x86_64-apple-darwin
                      build: npm run build:napi -- --target x86_64-apple-darwin
                    - host: macos-latest
                      target: aarch64-apple-darwin
                      build: npm run build:napi -- --target aarch64-apple-darwin
                    - host: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      build: npm run build:napi -- --target x86_64-unknown-linux-gnu --use-napi-cross
                    - host: ubuntu-latest
                      target: x86_64-unknown-linux-musl
                      build: npm run build:napi -- --target x86_64-unknown-linux-musl -x
                    - host: ubuntu-latest
                      target: aarch64-unknown-linux-gnu
                      build: npm run build:napi -- --target aarch64-unknown-linux-gnu --use-napi-cross
                    - host: ubuntu-latest
                      target: aarch64-unknown-linux-musl
                      build: npm run build:napi -- --target aarch64-unknown-linux-musl -x
                    - host: ubuntu-latest
                      target: armv7-unknown-linux-gnueabihf
                      build: npm run build:napi -- --target armv7-unknown-linux-gnueabihf --use-napi-cross
                    - host: windows-latest
                      target: x86_64-pc-windows-msvc
                      build: npm run build:napi -- --target x86_64-pc-windows-msvc

        runs-on: ${{ matrix.settings.host }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: stable
                  targets: ${{ matrix.settings.target }}

            - uses: mlugg/setup-zig@v2
              if: ${{ contains(matrix.settings.target, 'musl') }}
              with:
                  version: 0.15.2

            - name: Install cargo-zigbuild
              uses: taiki-e/install-action@v2
              if: ${{ contains(matrix.settings.target, 'musl') }}
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              with:
                  tool: cargo-zigbuild

            - name: Cache cargo
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      ~/.napi-rs
                      .cargo-cache
                      target/
                  key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}-${{ hashFiles('**/Cargo.lock') }}

            - name: Cache npm dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: npm-deps-${{ matrix.settings.host }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      npm-deps-${{ matrix.settings.host }}-

            - name: Install dependencies
              run: npm ci --cache=.npm --prefer-offline

            - name: Build napi-rs addon
              run: ${{ matrix.settings.build }}
              shell: bash

            - name: Upload napi artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: bindings-${{ matrix.settings.target }}
                  path: |
                      *.node
                      extract.js
                      extract.d.ts
                  if-no-files-found: error

    test-rust:
        name: Rust Tests
        runs-on: ubuntu-latest
        needs:
            - build-wasm
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-wasip1

            - name: Download WASM artifact
              uses: actions/download-artifact@v4
              with:
                  name: wasm-plugin
                  path: .

            - name: Run Rust tests
              run: cargo test --workspace

    test-node:
        name: Node.js Tests (Jest)
        runs-on: ubuntu-latest
        needs:
            - build-wasm
            - build-napi
        steps:
            - uses: actions/checkout@v4

            - name: Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 24

            - name: Cache npm dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: npm-deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      npm-deps-${{ runner.os }}-

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-wasip1

            - name: Install dependencies
              run: npm ci --cache=.npm --prefer-offline

            - name: Download WASM artifact
              uses: actions/download-artifact@v4
              with:
                  name: wasm-plugin
                  path: .

            - name: Download Linux napi artifact
              uses: actions/download-artifact@v4
              with:
                  name: bindings-x86_64-unknown-linux-gnu
                  path: .

            - name: List files
              run: ls -la
              shell: bash

            - name: Run Jest tests
              run: npm run test:jest:ci

    test-native-bindings:
        name: Test napi bindings on ${{ matrix.settings.target }} - node@${{ matrix.node }}
        needs:
            - build-napi
        strategy:
            fail-fast: false
            matrix:
                settings:
                    - host: macos-latest
                      target: aarch64-apple-darwin
                      architecture: arm64
                    - host: macos-latest
                      target: x86_64-apple-darwin
                      architecture: x64
                    - host: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      architecture: x64
                    - host: ubuntu-latest
                      target: x86_64-unknown-linux-musl
                      architecture: x64
                    - host: ubuntu-latest
                      target: aarch64-unknown-linux-gnu
                      architecture: arm64
                    - host: ubuntu-latest
                      target: aarch64-unknown-linux-musl
                      architecture: arm64
                    - host: windows-latest
                      target: x86_64-pc-windows-msvc
                      architecture: x64
                node:
                    - '18'
                    - '20'
                    - '22'

        runs-on: ${{ matrix.settings.host }}

        steps:
            - uses: actions/checkout@v4

            - name: Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  architecture: ${{ matrix.settings.architecture }}

            - name: Download napi artifacts
              uses: actions/download-artifact@v4
              with:
                  name: bindings-${{ matrix.settings.target }}
                  path: .

            - name: List files
              run: ls -la
              shell: bash

            - name: Test napi bindings load
              run: |
                  node -e "const native = require('./extract.js'); console.log('napi addon loaded successfully');"
              shell: bash

    publish:
        name: Publish
        runs-on: ubuntu-latest
        if: github.event_name == 'workflow_dispatch'
        permissions:
            contents: write
            id-token: write
        needs:
            - lint
            - build-wasm
            - build-napi
            - test-rust
            - test-node

        steps:
            - uses: actions/checkout@v4

            - name: Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: 'https://registry.npmjs.org/'

            - name: Cache npm dependencies
              uses: actions/cache@v4
              with:
                  path: ~/.npm
                  key: npm-deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
                  restore-keys: |
                      npm-deps-${{ runner.os }}-

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-wasip1

            - name: Install dependencies
              run: npm ci --cache=.npm --prefer-offline

            - name: Create npm dirs
              run: npm run create-npm-dirs

            - name: Download all napi artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  pattern: bindings-*

            - name: Download WASM artifact
              uses: actions/download-artifact@v4
              with:
                  name: wasm-plugin
                  path: .

            - name: Copy js entrypoint
              run: |
                  cp artifacts/bindings-x86_64-unknown-linux-gnu/extract.js extract.js
                  cp artifacts/bindings-x86_64-unknown-linux-gnu/extract.d.ts extract.d.ts
              shell: bash

            - name: List files
              run: |
                  ls -la
                  ls -R artifacts
              shell: bash

            - name: Move artifacts to npm dirs
              run: npm run artifacts

            - name: List npm packages
              run: |
                  ls -R ./npm
              shell: bash

            - name: Publish to npm
              run: |
                  # delete registry definition from local .npmrc
                  if [ -f .npmrc ]; then
                      grep -v '^registry=' .npmrc > .npmrc.tmp && mv .npmrc.tmp .npmrc
                  fi
                  npm config set provenance true
                  echo "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN" >> ~/.npmrc
                  if [ "${{ github.event.inputs.version_type }}" = "prerelease" ]; then
                    echo "Publishing prerelease version"
                    npm publish --tag draft --access public
                  else
                    echo "Publishing release version"
                    npm publish --access public
                  fi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
