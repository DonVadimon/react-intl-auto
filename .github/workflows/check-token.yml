name: Check NPM Token Expiry

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-token:
    runs-on: ubuntu-latest
    if: github.repository == 'lcl9288/swc-plugin-react-intl-auto'
    
    steps:
      - name: Check NPM Token Expiry
        run: |
          echo "Checking NPM token expiry..."
          
          # Check if token is valid and get expiry info
          TOKEN_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.NPM_TOKEN }}" \
            https://registry.npmjs.org/-/whoami 2>/dev/null || echo '{"error": "Invalid token"}')
          
          if echo "$TOKEN_INFO" | grep -q "error"; then
            echo "❌ NPM token is invalid or expired"
            echo "Please update the NPM_TOKEN secret in repository settings"
            exit 1
          fi
          
          # Extract expiry date if available
          EXPIRY_DATE=$(echo "$TOKEN_INFO" | jq -r '.expires // empty' 2>/dev/null)
          
          if [ -n "$EXPIRY_DATE" ] && [ "$EXPIRY_DATE" != "null" ]; then
            # Calculate days until expiry
            EXPIRY_TIMESTAMP=$(date -d "$EXPIRY_DATE" +%s 2>/dev/null || echo "0")
            CURRENT_TIMESTAMP=$(date +%s)
            DAYS_LEFT=$(( (EXPIRY_TIMESTAMP - CURRENT_TIMESTAMP) / 86400 ))
            
            echo "📅 Token expires on: $EXPIRY_DATE"
            echo "⏰ Days until expiry: $DAYS_LEFT"
            
            if [ $DAYS_LEFT -lt 0 ]; then
              echo "❌ NPM token has expired!"
              echo "Please update the NPM_TOKEN secret immediately"
              exit 1
            elif [ $DAYS_LEFT -lt 7 ]; then
              echo "⚠️ NPM token expires in $DAYS_LEFT days - URGENT!"
              echo "Please update the NPM_TOKEN secret as soon as possible"
              exit 1
            elif [ $DAYS_LEFT -lt 30 ]; then
              echo "⚠️ NPM token expires in $DAYS_LEFT days"
              echo "Consider updating the NPM_TOKEN secret soon"
            else
              echo "✅ NPM token is valid for $DAYS_LEFT more days"
            fi
          else
            echo "ℹ️ Could not determine token expiry date"
            echo "Token appears to be valid, but expiry info is not available"
          fi
          
          # Test token by trying to access package info
          echo "Testing token with package access..."
          PACKAGE_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.NPM_TOKEN }}" \
            https://registry.npmjs.org/swc-plugin-react-intl-auto 2>/dev/null || echo '{"error": "Access denied"}')
          
          if echo "$PACKAGE_INFO" | grep -q "error"; then
            echo "⚠️ Token cannot access package - may need publish permissions"
          else
            echo "✅ Token can access package information"
          fi
